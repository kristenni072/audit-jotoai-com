<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen flex items-center justify-center p-4">
  <!-- 登录卡片 -->
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <!-- Logo和标题 -->
    <div class="text-center mb-8">
      <div class="inline-block p-3 bg-gradient-to-r from-purple-600 to-blue-600 rounded-full mb-4">
        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">管理后台</h1>
      <p class="text-gray-500">请登录以继续</p>
    </div>

    <!-- 普通登录表单 -->
    <form id="loginForm" class="space-y-6">
      <!-- 邮箱输入框 -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
          邮箱
        </label>
        <input
          type="email"
          id="email"
          name="email"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
          placeholder="请输入邮箱"
          required
          autocomplete="email"
        />
      </div>

      <!-- 密码输入框 -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <label for="password" class="block text-sm font-medium text-gray-700">
            密码
          </label>
          <button
            type="button"
            id="forgotPasswordBtn"
            class="text-sm text-purple-600 hover:text-purple-700 font-medium"
          >
            忘记密码？
          </button>
        </div>
        <input
          type="password"
          id="password"
          name="password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
          placeholder="请输入密码"
          required
          autocomplete="current-password"
        />
      </div>

      <!-- 错误提示 -->
      <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
        <span id="errorText"></span>
      </div>

      <!-- 成功提示 -->
      <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm">
        <span id="successText"></span>
      </div>

      <!-- 登录按钮 -->
      <button
        type="submit"
        id="loginButton"
        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-lg font-medium hover:from-purple-700 hover:to-blue-700 transition transform hover:scale-[1.02] active:scale-[0.98]"
      >
        登录
      </button>
    </form>

    <!-- 一次性密码登录表单 (隐藏) -->
    <form id="otpForm" class="space-y-6 hidden">
      <!-- 邮箱输入框 (只读) -->
      <div>
        <label for="otpEmail" class="block text-sm font-medium text-gray-700 mb-2">
          邮箱
        </label>
        <input
          type="email"
          id="otpEmail"
          name="otpEmail"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50"
          readonly
        />
      </div>

      <!-- 一次性密码输入框 -->
      <div>
        <label for="oneTimePassword" class="block text-sm font-medium text-gray-700 mb-2">
          一次性密码
        </label>
        <input
          type="text"
          id="oneTimePassword"
          name="oneTimePassword"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
          placeholder="请输入邮件中的6位数字密码"
          required
          maxlength="6"
          pattern="[0-9]{6}"
        />
        <p class="mt-2 text-sm text-gray-500">
          一次性密码已发送到您的邮箱，15分钟内有效
        </p>
      </div>

      <!-- 错误提示 -->
      <div id="otpErrorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
        <span id="otpErrorText"></span>
      </div>

      <!-- 按钮组 -->
      <div class="space-y-3">
        <button
          type="submit"
          id="otpLoginButton"
          class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-lg font-medium hover:from-purple-700 hover:to-blue-700 transition"
        >
          使用一次性密码登录
        </button>
        <button
          type="button"
          id="backToLoginBtn"
          class="w-full bg-gray-100 text-gray-700 py-3 rounded-lg font-medium hover:bg-gray-200 transition"
        >
          返回普通登录
        </button>
      </div>
    </form>

  <script>
    const loginForm = document.getElementById('loginForm');
    const otpForm = document.getElementById('otpForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginButton');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const successMessage = document.getElementById('successMessage');
    const successText = document.getElementById('successText');
    const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
    const otpEmail = document.getElementById('otpEmail');
    const oneTimePasswordInput = document.getElementById('oneTimePassword');
    const otpLoginButton = document.getElementById('otpLoginButton');
    const otpErrorMessage = document.getElementById('otpErrorMessage');
    const otpErrorText = document.getElementById('otpErrorText');
    const backToLoginBtn = document.getElementById('backToLoginBtn');

    // 显示错误信息
    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.remove('hidden');
      successMessage.classList.add('hidden');
    }

    // 显示成功信息
    function showSuccess(message) {
      successText.textContent = message;
      successMessage.classList.remove('hidden');
      errorMessage.classList.add('hidden');
    }

    // 显示OTP错误信息
    function showOtpError(message) {
      otpErrorText.textContent = message;
      otpErrorMessage.classList.remove('hidden');
    }

    // 隐藏所有消息
    function hideMessages() {
      errorMessage.classList.add('hidden');
      successMessage.classList.add('hidden');
      otpErrorMessage.classList.add('hidden');
    }

    // 处理普通登录表单提交
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('请输入邮箱和密码');
        return;
      }

      // 禁用按钮，显示加载状态
      loginButton.disabled = true;
      loginButton.textContent = '登录中...';
      hideMessages();

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          // 保存token
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminEmail', data.email);
          localStorage.setItem('adminName', data.name);
          
          // 检查是否需要修改密码（以后端返回值为准，清除旧的本地标志）
          if (data.needsPasswordChange) {
            localStorage.setItem('needsPasswordChange', 'true');
            localStorage.setItem('tempPassword', password); // 保存临时密码供强制修改时使用
          } else {
            // 已修改过密码，清除可能残留的旧标志
            localStorage.removeItem('needsPasswordChange');
            localStorage.removeItem('tempPassword');
          }
          
          // 跳转到管理后台
          window.location.href = '/admin/admin.html';
        } else {
          showError(data.message || '登录失败，请检查邮箱和密码');
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('登录失败，请稍后重试');
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = '登录';
      }
    });

    // 忘记密码按钮
    forgotPasswordBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      
      if (!email) {
        showError('请先输入邮箱地址');
        return;
      }

      forgotPasswordBtn.disabled = true;
      forgotPasswordBtn.textContent = '发送中...';
      hideMessages();

      try {
        const response = await fetch('/api/admin/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (data.success) {
          showSuccess(data.message);
          
          // 切换到OTP登录表单
          setTimeout(() => {
            loginForm.classList.add('hidden');
            otpForm.classList.remove('hidden');
            otpEmail.value = email;
            oneTimePasswordInput.focus();
          }, 2000);
        } else {
          showError(data.message || '发送失败，请稍后重试');
        }
      } catch (error) {
        console.error('Forgot password error:', error);
        showError('发送失败，请稍后重试');
      } finally {
        forgotPasswordBtn.disabled = false;
        forgotPasswordBtn.textContent = '忘记密码？';
      }
    });

    // 一次性密码登录表单提交
    otpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = otpEmail.value.trim();
      const oneTimePassword = oneTimePasswordInput.value.trim();

      if (!oneTimePassword) {
        showOtpError('请输入一次性密码');
        return;
      }

      otpLoginButton.disabled = true;
      otpLoginButton.textContent = '登录中...';
      hideMessages();

      try {
        const response = await fetch('/api/admin/login-with-otp', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, oneTimePassword })
        });

        const data = await response.json();

        if (data.success) {
          // 保存token
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminEmail', data.email);
          localStorage.setItem('adminName', data.name);
          localStorage.setItem('needsPasswordChange', 'true'); // 使用OTP登录后必须修改密码
          localStorage.setItem('tempPassword', oneTimePassword); // 保存OTP供强制修改时使用
          
          // 跳转到管理后台
          window.location.href = '/admin/admin.html';
        } else {
          showOtpError(data.message || '登录失败，请检查一次性密码');
        }
      } catch (error) {
        console.error('OTP login error:', error);
        showOtpError('登录失败，请稍后重试');
      } finally {
        otpLoginButton.disabled = false;
        otpLoginButton.textContent = '使用一次性密码登录';
      }
    });

    // 返回普通登录
    backToLoginBtn.addEventListener('click', () => {
      otpForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
      hideMessages();
      oneTimePasswordInput.value = '';
    });

    // 检查是否已登录
    const token = localStorage.getItem('adminToken');
    if (token) {
      // 验证token是否有效
      fetch('/api/admin/verify', {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      })
      .then(res => res.json())
      .then(data => {
        if (data.valid) {
          window.location.href = '/admin/admin.html';
        }
      })
      .catch(err => console.error('Token verification error:', err));
    }
  </script>
</body>
</html>
