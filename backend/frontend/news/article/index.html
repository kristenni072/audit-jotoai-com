<script>
// Extract article ID from URL: /news/article/[id]/
function getArticleId() {
  const parts = location.pathname.split('/').filter(Boolean);
  // parts: ['news', 'article', '1772198762933']
  const idx = parts.indexOf('article');
  if (idx >= 0 && parts[idx + 1]) return parts[idx + 1];
  return null;
}

// Convert plain text or Markdown content to HTML
function textToHtml(text) {
  if (!text) return '<p>暂无内容</p>';
  let html = text;
  // Handle Markdown headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Handle bold **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Handle italic *text*
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Handle unordered list items
  html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, match => '<ul>' + match + '</ul>');
  // Split remaining text into paragraphs by double newlines
  const blocks = html.split(/\n\n+/);
  html = blocks.map(block => {
    block = block.trim();
    if (!block) return '';
    if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<li')) return block;
    block = block.replace(/\n/g, '<br>');
    return `<p>${block}</p>`;
  }).join('\n');
  return html;
}

async function loadArticle() {
  const id = getArticleId();
  if (!id) {
    showError();
    return;
  }

  try {
    const res = await fetch('/api/articles');
    if (!res.ok) throw new Error('API error');
    const articles = await res.json();
    const article = articles.find(a => String(a.id) === String(id));
    
    if (!article) {
      showError();
      return;
    }

    // Update page meta
    document.getElementById('page-title').textContent = article.title + ' - 闪阅 AI';
    document.getElementById('page-desc').content = (article.content || '').substring(0, 150);

    // Hero image
    const heroImg = document.getElementById('hero-img');
    if (article.imageUrl) {
      heroImg.src = article.imageUrl;
      heroImg.alt = article.title;
    } else {
      document.getElementById('hero-section').style.background = 'linear-gradient(135deg, #0A1A2F, #1a2a4f)';
    }

    // Fill content
    document.getElementById('article-category').textContent = article.keyword || 'AI教育';
    document.getElementById('article-title').textContent = article.title;
    document.getElementById('breadcrumb-title').textContent = article.title;
    
    const dateStr = article.createdAt ? article.createdAt.substring(0, 10) : '';
    document.getElementById('article-date').textContent = dateStr;
    
    const words = (article.content || '').length;
    const mins = Math.max(3, Math.round(words / 400));
    document.getElementById('article-readtime').textContent = mins + ' min read';
    document.getElementById('article-keyword').textContent = '#' + (article.keyword || 'AI教育');

    // Render content
    const body = document.getElementById('article-body');
    // Check if content is HTML or plain text
    if (article.content && (article.content.includes('<p>') || article.content.includes('<h'))) {
      body.innerHTML = article.content;
    } else {
      body.innerHTML = textToHtml(article.content || '');
    }

    // Show article
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('article-content').style.display = 'block';

  } catch(e) {
    console.error(e);
    showError();
  }
}

function showError() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', loadArticle);
</script>
