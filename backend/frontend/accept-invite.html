<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接受管理员邀请</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen flex items-center justify-center p-4">
  <!-- 接受邀请卡片 -->
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <!-- Logo和标题 -->
    <div class="text-center mb-8">
      <div class="inline-block p-3 bg-gradient-to-r from-purple-600 to-blue-600 rounded-full mb-4">
        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l7-4.666a2 2 0 012.22 0l7 4.666A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">🎉 管理员邀请</h1>
      <p class="text-gray-500" id="welcomeText">正在验证邀请链接...</p>
    </div>

    <!-- 加载状态 -->
    <div id="loadingState" class="text-center py-8">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
      <p class="mt-4 text-gray-600">正在验证邀请链接...</p>
    </div>

    <!-- 设置密码表单 -->
    <form id="acceptInviteForm" class="space-y-6 hidden">
      <!-- 邮箱（只读） -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
          邮箱
        </label>
        <input
          type="email"
          id="email"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50"
          readonly
        />
      </div>

      <!-- 姓名（只读） -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
          姓名
        </label>
        <input
          type="text"
          id="name"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50"
          readonly
        />
      </div>

      <!-- 设置密码 -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
          设置密码
        </label>
        <input
          type="password"
          id="password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
          placeholder="至少8位，包含字母和数字"
          required
          minlength="8"
        />
      </div>

      <!-- 确认密码 -->
      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
          确认密码
        </label>
        <input
          type="password"
          id="confirmPassword"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
          placeholder="再次输入密码"
          required
          minlength="8"
        />
      </div>

      <!-- 错误提示 -->
      <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
        <span id="errorText"></span>
      </div>

      <!-- 提交按钮 -->
      <button
        type="submit"
        id="submitButton"
        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-lg font-medium hover:from-purple-700 hover:to-blue-700 transition transform hover:scale-[1.02] active:scale-[0.98]"
      >
        接受邀请并创建账号
      </button>
    </form>

    <!-- 错误状态 -->
    <div id="errorState" class="hidden text-center py-8">
      <div class="text-6xl mb-4">❌</div>
      <p class="text-xl font-semibold text-gray-800 mb-2" id="errorTitle">邀请链接无效</p>
      <p class="text-gray-600" id="errorDescription">该邀请链接可能已过期或已被使用</p>
    </div>

    <!-- 成功状态 -->
    <div id="successState" class="hidden text-center py-8">
      <div class="text-6xl mb-4">✅</div>
      <p class="text-xl font-semibold text-gray-800 mb-2">账号创建成功！</p>
      <p class="text-gray-600 mb-6">正在跳转到管理后台...</p>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const loadingState = document.getElementById('loadingState');
    const acceptInviteForm = document.getElementById('acceptInviteForm');
    const errorState = document.getElementById('errorState');
    const successState = document.getElementById('successState');
    const welcomeText = document.getElementById('welcomeText');
    const emailInput = document.getElementById('email');
    const nameInput = document.getElementById('name');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitButton = document.getElementById('submitButton');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const errorTitle = document.getElementById('errorTitle');
    const errorDescription = document.getElementById('errorDescription');

    // 显示错误信息
    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.remove('hidden');
    }

    // 隐藏错误信息
    function hideError() {
      errorMessage.classList.add('hidden');
    }

    // 验证邀请token
    async function verifyInvitation() {
      if (!token) {
        showErrorState('邀请链接无效', '缺少必要的参数');
        return;
      }

      try {
        const response = await fetch(`/api/admin/verify-invite/${token}`);
        const data = await response.json();

        if (data.success) {
          // 显示设置密码表单
          emailInput.value = data.email;
          nameInput.value = data.name;
          welcomeText.textContent = `欢迎，${data.name}！`;
          
          loadingState.classList.add('hidden');
          acceptInviteForm.classList.remove('hidden');
        } else {
          showErrorState('邀请链接无效', data.message || '该邀请链接可能已过期或已被使用');
        }
      } catch (error) {
        console.error('Verify invitation error:', error);
        showErrorState('验证失败', '无法验证邀请链接，请稍后重试');
      }
    }

    // 显示错误状态
    function showErrorState(title, description) {
      loadingState.classList.add('hidden');
      acceptInviteForm.classList.add('hidden');
      errorTitle.textContent = title;
      errorDescription.textContent = description;
      errorState.classList.remove('hidden');
    }

    // 处理表单提交
    acceptInviteForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      hideError();

      // 验证密码
      if (password.length < 8) {
        showError('密码至少8位');
        return;
      }

      if (!/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
        showError('密码必须包含字母和数字');
        return;
      }

      if (password !== confirmPassword) {
        showError('两次输入的密码不一致');
        return;
      }

      // 禁用按钮，显示加载状态
      submitButton.disabled = true;
      submitButton.textContent = '创建中...';

      try {
        const response = await fetch('/api/admin/accept-invite', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (data.success) {
          // 保存token
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminEmail', data.email);
          localStorage.setItem('adminName', data.name);
          
          // 显示成功状态
          acceptInviteForm.classList.add('hidden');
          successState.classList.remove('hidden');
          
          // 3秒后跳转到管理后台
          setTimeout(() => {
            window.location.href = '/admin/admin.html';
          }, 3000);
        } else {
          showError(data.message || '创建账号失败');
          submitButton.disabled = false;
          submitButton.textContent = '接受邀请并创建账号';
        }
      } catch (error) {
        console.error('Accept invitation error:', error);
        showError('创建账号失败，请稍后重试');
        submitButton.disabled = false;
        submitButton.textContent = '接受邀请并创建账号';
      }
    });

    // 页面加载时验证邀请
    verifyInvitation();
  </script>
</body>
</html>
